<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 天空蓝底圆 -->
  <circle cx="16" cy="16" r="15" fill="#B3DDF2"/>

  <!-- 小鱼：简洁线条风，宫崎骏式的柔和感 -->
  <!-- 鱼身 -->
  <ellipse cx="17" cy="17" rx="6.5" ry="4.5" fill="none" stroke="#4A7C96" stroke-width="1.8" stroke-linecap="round"/>
  <!-- 鱼尾 -->
