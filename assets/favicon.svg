  <!-- 眼睛 -->
  <circle cx="21" cy="16" r="1.2" fill="#4A7C96"/>
  <!-- 小鱼鳍 -->
  <path d="M16 13 Q17 9 19 13" fill="none" stroke="#4A7C96" stroke-width="1.4" stroke-linecap="round"/>
